baseURL: "https://hunterhhunter.github.io/"
title: "Hunter's Study Blog"
languageCode: ko
defaultContentLanguage: ko
theme: PaperMod
pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  description: "공부한 내용을 기록하는 개인 블로그"
  author: hunterhhunter
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Hunter's Study Blog"
    Content: "공부한 내용을 기록하고 공유하는 블로그입니다."

  socialIcons:
    - name: github
      url: "https://github.com/hunterhhunter"

  assets:
    disableHLJS: true

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
    style: monokai

outputs:
  home:
    - HTML
    - RSS

taxonomies:
  category: categories
  tag: tags

menu:
  main:
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
